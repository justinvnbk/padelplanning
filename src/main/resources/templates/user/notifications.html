<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container py-4">
    <h1 class="text-center mb-5 border-dark border-bottom" style="font-size: xxx-large">Uw notificaties</h1>
    <div class="text-center border border-danger border-5 mb-4 bg-dark text-light rounded-4 p-3" th:each="notification : ${#lists.toList(player.notifications).reversed()}" th:object="${notification}">
        <h2 class="text-danger mb-5" th:text="*{title}"></h2>
        <p class="fs-4 mb-5" th:text="*{message}"></p>
        <p class="text-info border-top border-light pt-3" th:text="|Ontvangen: ${#temporals.format(notification.dateTime, 'dd/MM/yyyy HH:mm')}|"></p>
    </div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
