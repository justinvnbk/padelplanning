<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container py-4 overflow-hidden">

    <h1 class="text-center mb-5 border-dark border-bottom notification-title" style="font-size: xxx-large">Uw notificaties</h1>
    <div th:each="notification : ${#lists.toList(player.notifications).reversed()}" th:object="${notification}"
         class="text-center mx-auto justify-content-center border col-12 col-md-8 border-dark border-3 mb-4 bg-secondary bg-opacity-25 text-light rounded-4 p-2 overflow-auto">

        <a th:if="*{padelDayId != null and !#vars.expiredPadelDayIds.contains(padelDayId)}"
           th:href="@{/user/signup/{id}(id=*{padelDayId})}"
           class="text-decoration-none text-light d-block p-2 rounded-4 position-relative overflow-hidden card-clickable shadow-sm">

            <div class="corner-peel">GA NAAR</div>

            <h2 class="text-primary-emphasis mb-4 mb-md-5 msg-title pe-5 ps-5 text-center" th:text="*{title}"></h2>
            <p class="fs-4 mb-3 mb-md-5 text-dark text-break msg text-center" th:text="*{message}"></p>

            <p class="small text-muted border-top border-light pt-1 mt-2 mb-0 text-center not-date"
               th:text="|Ontvangen: ${#temporals.format(notification.dateTime, 'dd/MM/yyyy HH:mm')}|"></p>
        </a>

        <div th:unless="*{padelDayId != null and !#vars.expiredPadelDayIds.contains(padelDayId)}">
            <h2 class="text-primary-emphasis mb-4 mb-md-5 msg-title" th:text="*{title}"></h2>
            <p class="fs-4 mb-3 mb-md-5 text-dark text-break msg" th:text="*{message}"></p>
            <p class="small text-muted border-top border-light pt-1 mt-2 mb-0 text-center not-date"
               th:text="|Ontvangen: ${#temporals.format(notification.dateTime, 'dd/MM/yyyy HH:mm')}|"></p>
        </div>


    </div>

</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer>

</script>
</body>
</html>
