<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>
<main class="login">
    <div class="container-fluid">
        <form th:action="@{/register}" th:object="${player}" method="post">
            <h1 class="text-center text-white mt-5">Registreer</h1>
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4 mt-5">
                    <div class="card border border-subtle rounded-3 shadow-sm">
                        <div class="card-body p-3 p-md-4 p-xl-5">
                            <div class="row gy-2">

                                <div th:if="${error}" class="col-12">
                                    <div class="alert alert-danger" th:text="${error}"></div>
                                </div>

                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input
                                                id="name"
                                                th:field="*{name}"
                                                class="form-control border-secondary"
                                                placeholder="name"
                                                name="name"
                                                required
                                        />
                                        <label for="name" style="background-color: transparent;">
                                            Naam en achternaam <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input
                                                id="email"
                                                th:field="*{email}"
                                                class="form-control border-secondary"
                                                placeholder="email"
                                                name="email"
                                                type="email"
                                                required
                                        />
                                        <label for="email" style="background-color: transparent;">
                                            E-mail <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input
                                                id="password"
                                                th:field="*{password}"
                                                class="form-control border-secondary"
                                                placeholder="password"
                                                name="password"
                                                type="password"
                                                required
                                        />
                                        <label for="password" style="background-color: transparent;">
                                            Wachtwoord <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="d-block px-3 mb-2">Geslacht <span class="text-danger">*</span></label>
                                    <div class="form-check form-check-inline ms-4 mb-3">
                                        <input id="genderMale" type="radio" name="gender" value="M"
                                               class="form-check-input" required
                                               th:checked="*{gender == 'M'}"/>
                                        <label for="genderMale" class="form-check-label">Man</label>
                                    </div>
                                    <div class="form-check form-check-inline mb-3">
                                        <input id="genderFemale" type="radio" name="gender" value="F"
                                               class="form-check-input" required
                                               th:checked="*{gender == 'F'}"/>
                                        <label for="genderFemale" class="form-check-label">Vrouw</label>
                                    </div>
                                    <div class="form-check form-check-inline mb-3">
                                        <input id="genderX" type="radio" name="gender" value="X"
                                               class="form-check-input" required
                                               th:checked="*{gender == 'X'}"/>
                                        <label for="genderX" class="form-check-label">Anders</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input
                                                id="birthDate"
                                                th:field="*{birthDate}"
                                                class="form-control border-secondary"
                                                placeholder="birthDate"
                                                name="birthDate"
                                                type="date"
                                                th:max="${#temporals.format(#temporals.createNow().minusYears(8), 'yyyy-MM-dd')}"
                                                required
                                        />
                                        <label for="birthDate" style="background-color: transparent;">
                                            Geboorte <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="input-group mb-3">
                                        <span class="input-group-text border-secondary" id="country-code">+32</span>
                                        <div class="form-floating">
                                            <input
                                                    id="telephone"
                                                    th:field="*{telephone}"
                                                    class="form-control border-secondary"
                                                    placeholder="+32 4XX XX XX XX"
                                                    name="telephone"
                                                    type="tel"
                                                    pattern="\[0-9]{9}"
                                                    aria-describedby="country-code"
                                                    required
                                            />
                                            <label for="telephone">
                                                GSM <span class="text-danger">*</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <select id="selfEvaluation" th:field="*{selfEvaluation}"
                                                class="form-select border-secondary" required>
                                            <option th:each="se : ${selfEvaluations}"
                                                    th:value="${se}"
                                                    th:text="${se}"></option>
                                        </select>
                                        <label for="selfEvaluation" style="background-color: transparent;">
                                            Zelfbeoordeling <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <select id="preferredPlayside" th:field="*{preferredPlayside}"
                                                class="form-select border-secondary" required>
                                            <option th:each="ps : ${playsides}"
                                                    th:value="${ps}"
                                                    th:text="${ps}"></option>
                                        </select>
                                        <label for="preferredPlayside"
                                               style="background-color: transparent;">
                                            Voorkeurzijde <span class="text-danger">*</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-check mt-2 ms-1">
                                        <input id="noPranking" type="checkbox" name="noPranking"
                                               class="form-check-input" checked
                                               onclick="document.getElementById('pRanking').disabled = this.checked;
                                                     document.getElementById('pRanking').value = '';"/>
                                        <label for="noPranking" style="background-color: transparent;">
                                            Geen P-Ranking (NVT)
                                        </label>
                                    </div>
                                    <div class="form-floating">
                                        <select id="pRanking" name="pRanking"
                                                class="form-select border-secondary" disabled>
                                            <option value="">-- Kies P-ranking --</option>
                                            <option value="50">P50</option>
                                            <option value="100">P100</option>
                                            <option value="200">P200</option>
                                            <option value="300">P300</option>
                                            <option value="400">P400</option>
                                            <option value="500">P500</option>
                                            <option value="700">P700</option>
                                            <option value="1000">P1000</option>
                                        </select>
                                        <label for="pRanking" style="background-color: transparent;">
                                            P-Ranking
                                        </label>
                                    </div>
                                    <p class="text-secondary small m-0">P-ranking is een ranking die u word toegewezen door Padel Vlaanderen</p>
                                    <a class="small m-0" href="https://www.tennisenpadelvlaanderen.be/padel/klassementen" target="_blank">Meer info over P-ranking</a>
                                </div>
                                <button type="submit" class="btn btn-pma btn-block mb-4">
                                    Registreren
                                </button>
                                <div class="text-center">
                                    <p>Al geregistreerd? <a class="text-danger" th:href="@{/login}">Log in</a></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
