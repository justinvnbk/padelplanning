<!doctype html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>

<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
    <div class="container py-5">
        <section class="mb-5">

            <h2 class="mb-4 text-light">Jouw evenementen</h2>

            <div th:if="${yourEvents.isEmpty()}" class="alert alert-info">U bent momenteel voor geen enkel evenement ingeschreven.</div>

            <div class="row g-4" th:unless="${yourEvents.isEmpty()}">

                <div class="col-12 col-md-6 col-lg-4" th:each="clubEvent : ${yourEvents}">

                    <div class="card h-100 shadow-sm">

                        <a th:href="@{/user/events/{id}(id=${clubEvent.id})}" class="text-decoration-none text-black h-100">

                            <div class="card-header bg-success text-white p-3">
                                <h3 class="h4 mb-0" th:text="${clubEvent.title}"></h3>
                            </div>

                            <div class="card-body">

                                <p th:if="${clubEvent.description != null && !clubEvent.description.isBlank()}"th:text="${clubEvent.description}"></p>

                                <p>
                                    <strong>Locatie:</strong>
                                    <span th:text="${clubEvent.location}"></span>
                                </p>

                                <p>
                                    <strong>Start:</strong>
                                    <span th:text="${#temporals.format(clubEvent.startDateTime,'dd-MM-yyyy HH:mm')}"></span>
                                </p>

                                <p class="mb-0">
                                    <strong>Deelnemers:</strong>

                                    <span th:text="${clubEvent.participants.size()}"></span>

                                    <span th:if="${clubEvent.maximumParticipants != null}">
                                /
                                <span th:text="${clubEvent.maximumParticipants}"></span>
                            </span>
                                </p>

                            </div>
                        </a>

                    </div>
                </div>

            </div>
        </section>

        <section>
            <h2 class="mb-4 text-light">Andere evenementen</h2>

            <div th:if="${otherEvents.isEmpty()}" class="alert alert-info">Er zijn momenteel geen andere aankomende evenementen.</div>

            <div class="row g-4" th:unless="${otherEvents.isEmpty()}">

                <div class="col-12 col-md-6 col-lg-4" th:each="clubEvent : ${otherEvents}">

                    <div class="card h-100 shadow-sm">

                        <a th:href="@{/user/events/{id}(id=${clubEvent.id})}" class="text-decoration-none text-black h-100">

                            <div class="card-header bg-secondary text-white p-3">
                                <h3 class="h4 mb-0" th:text="${clubEvent.title}"></h3>
                            </div>

                            <div class="card-body">

                                <p th:if="${clubEvent.description != null && !clubEvent.description.isBlank()}"th:text="${clubEvent.description}"></p>

                                <p>
                                    <strong>Locatie:</strong>
                                    <span th:text="${clubEvent.location}"></span>
                                </p>

                                <p>
                                    <strong>Start:</strong>
                                    <span th:text="${#temporals.format(clubEvent.startDateTime,'dd-MM-yyyy HH:mm')}"></span>
                                </p>

                                <p class="mb-0">
                                    <strong>Deelnemers:</strong>

                                    <span th:text="${clubEvent.participants.size()}"></span>

                                    <span th:if="${clubEvent.maximumParticipants != null}">
                                /
                                <span th:text="${clubEvent.maximumParticipants}"></span>
                            </span>
                                </p>

                            </div>
                        </a>

                    </div>
                </div>

            </div>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/headerfooter::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
