<!doctype html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>

<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
    <div class="container py-5">

        <h1 class="text-center text-light mb-5">Aankomende evenementen</h1>

        <div th:if="${clubEvents.isEmpty()}" class="alert alert-info text-center">
            Er zijn momenteel geen aankomende evenementen.
        </div>

        <div class="row g-4" th:unless="${clubEvents.isEmpty()}">

            <div class="col-12 col-md-6 col-lg-4" th:each="clubEvent : ${clubEvents}">

                <div class="card h-100 shadow-sm">

                    <a th:href="@{/user/events/{id}(id=${clubEvent.id})}" class="text-decoration-none text-black h-100">

                        <div class="card-header bg-dark text-white p-3">
                            <h2 class="h4 mb-0" th:text="${clubEvent.title}"></h2>
                        </div>

                        <div class="card-body">
                            <p class="card-text text-secondary" th:if="${clubEvent.description != null && !clubEvent.description.isBlank()}" th:text="${clubEvent.description}"></p>

                            <p class="card-text">
                                <strong>Locatie:</strong>
                                <span th:text="${clubEvent.location}"></span>
                            </p>

                            <p class="card-text">
                                <strong>Start:</strong>
                                <span th:text="${#temporals.format(clubEvent.startDateTime,'dd-MM-yyyy HH:mm')}"></span>
                            </p>

                            <p class="card-text">
                                <strong>Einde:</strong>
                                <span th:text="${#temporals.format(clubEvent.endDateTime,'dd-MM-yyyy HH:mm')}"></span>
                            </p>

                            <p class="card-text mb-0">
                                <strong>Deelnemers:</strong>
                                <span th:text="${clubEvent.participants.size()}"></span>
                                <span th:if="${clubEvent.maximumParticipants != null}">/<span th:text="${clubEvent.maximumParticipants}"></span></span>
                            </p>

                        </div>
                    </a>

                </div>
            </div>

        </div>

    </div>
</main>

<footer th:replace="~{fragments/headerfooter::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
