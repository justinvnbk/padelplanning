<!doctype html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>

<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
  <div class="container py-5">

    <div class="mb-4">
      <a class="btn btn-outline-light" th:href="@{/user/events}">← Terug naar evenementen</a>
    </div>

    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">

        <div class="card border border-subtle rounded-3 shadow-sm" th:object="${clubEvent}">
          <div class="card-header text-white p-3" th:classappend="${isRegistered} ? ' bg-success' : ' bg-secondary'">
            <h1 class="h3 mb-0" th:text="*{title}"></h1>
          </div>

          <div class="card-body p-3 p-md-4">
            <div class="mb-4" th:if="*{description != null && !description.isBlank()}">
              <h2 class="h5 fw-bold">Beschrijving</h2>
              <p class="mb-0" style="white-space: pre-line;" th:text="*{description}"></p>
            </div>

            <div class="mb-4">
              <h2 class="h5 fw-bold">Locatie</h2>
              <p class="mb-0" th:text="*{location}"></p>
            </div>

            <div class="row g-4 mb-4">
              <div class="col-12 col-md-6">
                <h2 class="h5 fw-bold">Start</h2>
                <p class="mb-0" th:text="${#temporals.format(clubEvent.startDateTime,'dd-MM-yyyy HH:mm')}"></p>
              </div>

              <div class="col-12 col-md-6">
                <h2 class="h5 fw-bold">Einde</h2>
                <p class="mb-0" th:text="${#temporals.format(clubEvent.endDateTime,'dd-MM-yyyy HH:mm')}"></p>
              </div>
            </div>

            <div class="mb-4">
              <h2 class="h5 fw-bold">Prijs</h2>
              <p class="mb-0">
                <span th:if="${clubEvent.price.signum() == 0}">Gratis</span>
                <span th:unless="${clubEvent.price.signum() == 0}">€ <span th:text="${#numbers.formatDecimal(clubEvent.price, 1, 2)}"></span></span>
              </p>
            </div>

            <div>
              <h2 class="h5 fw-bold">Deelnemers</h2>
              <p class="mb-0"><span th:text="*{participants.size()}"></span><span th:if="*{maximumParticipants != null}">/<span th:text="*{maximumParticipants}"></span></span>deelnemers</p>
            </div>

            <div class="mt-4 pt-4 border-top">

              <div th:if="${alertSuccess}" class="alert alert-success" th:text="${alertSuccess}"></div>

              <div th:if="${alertInfo}" class="alert alert-info" th:text="${alertInfo}"></div>

              <div th:if="${alertWarning}" class="alert alert-warning" th:text="${alertWarning}"></div>

              <div th:if="${alertDanger}" class="alert alert-danger" th:text="${alertDanger}"></div>

              <div th:if="${isRegistered}">

                <form th:action="@{/user/events/{id}/unregister(id=${clubEvent.id})}" method="post">
                  <button class="btn btn-danger w-100" type="submit">
                    Uitschrijven voor evenement
                  </button>
                </form>

              </div>
              <div th:unless="${isRegistered}">
                <div th:if="${isFull}" class="alert alert-danger mb-0">Dit evenement is volzet.</div>
                <form th:unless="${isFull}" th:action="@{/user/events/{id}/register(id=${clubEvent.id})}" method="post">
                  <button class="btn btn-success w-100" type="submit">
                    Inschrijven voor evenement
                  </button>
                </form>
              </div>

              <div th:if="${isRegistered && clubEvent.price != null && clubEvent.price.signum() > 0}" class="mt-3">
                <form th:if="${isRegistered && !hasPaid && clubEvent.price != null && clubEvent.price.signum() > 0}"
                      th:action="@{/user/events/{id}/pay(id=${clubEvent.id})}" method="post">
                  <button class="btn btn-primary w-100" type="submit">
                    Betalen € <span th:text="${#numbers.formatDecimal(clubEvent.price, 1, 2)}"></span>
                  </button>
                </form>

                <button th:if="${hasPaid}" class="btn btn-success w-100" type="button" disabled>
                  Betaald
                </button>
              </div>

            </div>

          </div>

        </div>

      </div>
    </div>

  </div>
</main>

<footer th:replace="~{fragments/headerfooter::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
<script>
  const paymentButton = document.getElementById("eventPaymentButton");

  if (paymentButton) {
    paymentButton.addEventListener("click", async function () {
      const eventId = paymentButton.dataset.eventId;

      paymentButton.disabled = true;
      paymentButton.textContent = "Betaling voorbereiden...";

      try {
        const response = await fetch(`/user/events/${eventId}/pay`, {
          method: "POST"
        });

        if (!response.ok) {
          throw new Error("Betaling kon niet gestart worden.");
        }

        const checkoutUrl = await response.text();

        window.location.href = checkoutUrl;
      } catch (error) {
        paymentButton.disabled = false;
        paymentButton.textContent = "Betalen";

        console.error(error);
      }
    });
  }
</script>
</body>
</html>
