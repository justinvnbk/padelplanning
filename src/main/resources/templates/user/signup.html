<!doctype html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head::headfragment}"></head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.6/Sortable.min.js" integrity="sha512-csIng5zcB+XpulRUa+ev1zKo7zRNGpEaVfNB9On1no9KYTEY/rLGAEEpvgdw6nim1WdTuihZY1eqZ31K7/fZjw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
    <div class="container py-4" th:object="${padelDay}">
        <h2 style="font-size: 2.5rem" class="mb-4 text-center text-white info-title">Algemene informatie over de volgende
            padeldag:</h2>

        <div class="container mt-3 mx-auto col-12 col-md-8">
            <div th:if="${alertSuccess}" class="alert alert-success alert-dismissible fade show text-center shadow-sm" role="alert">
                <span th:text="${alertSuccess}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${alertWarning}" class="alert alert-warning alert-dismissible fade show text-center shadow-sm text-dark" role="alert">
                <span th:text="${alertWarning}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${alertDanger}" class="alert alert-danger alert-dismissible fade show text-center shadow-sm" role="alert">
                <span th:text="${alertDanger}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${alertInfo}" class="alert alert-info alert-dismissible fade show text-center shadow-sm" role="alert">
                <span th:text="${alertInfo}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>

        <div class="row mt-5" sec:authorize="hasAuthority('ADMIN')">
            <div class="col-12 col-md-6 d-flex flex-column flex-sm-row justify-content-center justify-content-sm-start align-items-center gap-3 my-2">

                <a style="font-size: 1.2rem" class="btn btn-primary px-3 py-2 fw-bold shadow-sm admin-btn-spec"
                   th:href="@{|/admin/editpadelday/*{id}|}">
                    ⚙️Padeldag aanpassen
                </a>

                <form class="m-0 w-sm-auto text-center" th:action="@{/admin/plan}" th:if="${!hasPlan}" method="post">
                    <input type="hidden" name="id" th:value="${padelDay.id}"/>
                    <button style="font-size: 1.2rem" class="btn btn-primary px-3 py-2 fw-bold shadow-sm admin-btn-spec"
                            type="submit">
                        📋Maak planning aan
                    </button>
                </form>

            </div>
        </div>
        <!--        Admin view for publish-->
        <div sec:authorize="hasAuthority('ADMIN')" th:if="${hasPlan && !padelDay.published}" class="mb-3">
            <div class="d-flex flex-column flex-md-row justify-content-center align-items-center gap-3 mb-4 ">
                <a style="font-size: 1.3rem" class="btn btn-primary px-3 fw-bold shadow-sm admin-btn-spec"
                   th:href="@{|/admin/payments/*{id}|}">
                    🏦Bekijk betalingen
                </a>
                <span th:if="${padelDay.published}" style="font-size: 1.3rem"
                      class="btn btn-success disabled px-3 fw-bold shadow-sm admin-btn-spec">
                    ✅ Planning gepubliceerd
                </span>
                <form th:unless="${padelDay.published}"
                      th:action="@{|/admin/publishplan/*{id}|}"
                      method="post"
                      class="m-0">
                    <button style="font-size: 1.3rem"
                            class="btn btn-primary px-3 fw-bold shadow-sm admin-btn"
                            type="submit">
                        ‼️Publiceer planning
                    </button>
                </form>
            </div>
            <div id="alert-section" class="row justify-content-center">
                <div th:if="${error}"
                     class="alert alert-danger alert-dismissible fade show col-11 col-md-5" role="alert">
                    <strong>Niet opgeslagen!</strong> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${success}"
                     class="alert alert-success alert-dismissible fade show col-11 col-md-5" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${info}"
                     class="alert alert-info alert-dismissible fade show col-11 col-md-5" role="alert">
                    <span th:text="${info}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </div>

            <div class="row border border-black">
                <div class="col-12 g-0 m-0 border bg-dark text-light p-2 fw-bold"
                     th:text="${#temporals.format(padelDay.date, 'dd/MM/yyyy')}"></div>
            </div>

            <form th:action="@{/admin/planEdit}" method="post">
                <input type="hidden" name="padelDayId" th:value="${padelDay.id}"/>

                <div th:each="field : ${padelDay.fields}" class="row border border-end-0 border-black">
                    <div class="col-1 d-flex align-items-center justify-content-center fs-2 fw-bold veld"
                         th:text="${field.name}"></div>

                    <div class="row col-11 m-0 g-0 flex-nowrap">
                        <div class="col border border-bottom-0 border-top-0 border-end-0 m-0 g-0"
                             th:each="match, i : ${padelDay.matches}" th:if="${match.field.id == field.id}">
                            <div class="col-12 m-0 g-0">
                                <h6 class="fw-bold p-3 bg-dark bg-opacity-75 text-light m-0 g-0"
                                    th:text="|Matches van ${match.getTimeSlot()}|">
                                </h6>
                            </div>

                        <form th:each="team, i : ${match.getTeams()}" th:object="${team}" th:action="@{/admin/planEdit}"
                              method="post"
                              class="box-shadow m-0 border border-dark border-bottom-0 bg-dark bg-opacity-10">
                            <input type="hidden" name="teamId" th:value="${team.id}"/>
                            <input type="hidden" name="padelDayId" th:value="${padelDay.id}"/>
                            <!-- Change the inner loop to use a fixed sequence (0 to 1 for two players) -->
                            <div class="m-1" th:each="index : ${#numbers.sequence(0, 1)}">
                                <select class="form-select my-3" name="playerIds"
                                        th:style="|background-color: ${i.index==0 ? '#19466e' : '#f6f45a'}; color: ${i.index==0 ? '#FFFFFF' : '#000000'};|">
                            <div class="swap-matches" th:data-match-id="${match.id}"> <!--th:data-timeslot="${match.timeSlot}"-->
                                <div th:each="team, i : ${match.getTeams()}"
                                     class="swap-teams box-shadow m-0 border border-dark"
                                     th:data-timeslot="${match.timeSlot.hashCode()*-1}">

                                <input type="hidden" name="teamId" th:value="${team.id}"/>

                                    <!-- Logic to check if a player exists at this index -->
                                    <option th:each="player : ${padelDay.getSignedUpPlayers()}"
                                            th:value="${player.getId()}"
                                            th:text="|${player.getName()} (P-${player.pRanking})|"
                                            th:selected="${team.getPlayers().size() > index && team.getPlayers().get(index).getId() == player.getId()}">
                                    </option>
                                    <div th:each="index : ${#numbers.sequence(0, 1)}"
                                         class="swappable-player m-2 p-2 rounded fw-bold"
                                         th:style="|background-color: ${i.index==0 ? '#19466e' : '#f6f45a'}; color: ${i.index==0 ? '#FFFFFF' : '#000000'}; cursor: grab;|">

                                    <!-- The empty option -->
                                    <option th:value="0" th:selected="${team.getPlayers().size() <= index}">Leeg
                                    </option>
                                </select>
                            </div>

                            <button class="btn btn-pma m-2 fw-bold shadow-sm" type="submit">Save</button>
                        </form>
                                        <input type="hidden" name="playerIds"
                                               th:value="${team.getPlayers().size() > index ? team.getPlayers().get(index).getId() : 0}"/>

                                        <span th:text="${team.getPlayers().size() > index ? team.getPlayers().get(index).getName() + ' (P-' + team.getPlayers().get(index).pRanking + ')' : 'Leeg'}"></span>
                                    </div>
                                </div><!-- /.swap-teams -->
                            </div><!-- /.swap-matches -->
                        </div>
                    </div>
                </div>

                <!-- sticky save button -->
                <div class="position-sticky bottom-0 d-flex justify-content-end p-3">
                    <button class="btn btn-pma fw-bold shadow" type="submit">
                        Save Schedule
                    </button>
                </div>

            </form>

        </div>
        <div class="mt-4">
            <h3 class="border-dark border-bottom text-center">Reservelijst: </h3>
            <div class="mt-3 text-center" th:each="p : ${padelDay.reservedPlayers}">
                <div th:text="|-${p.name}|"></div>
            </div>
            <div class="mt-3 fs-5 text-center"
                 th:text="${padelDay.reservedPlayers.size()==0?'Reservelijst is leeg':''}"></div>
        </div>
        <div th:if="${padelDay.isPublished() && padelDay.signedUpPlayers.contains(currentUser)}">
            <h1 class="text-center text-white my-5">Planning</h1>
            <div th:replace="~{fragments/plantable::plantablefragment}"></div>
        </div>
        <div th:if="${padelDay.isPublished() && !padelDay.signedUpPlayers.contains(currentUser)}"
             sec:authorize="hasAuthority('ADMIN')">
            <h1 class="text-center text-white my-5">Planning</h1>
            <div th:replace="~{fragments/plantable::plantablefragment}"></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
<script>
    const players = document.querySelectorAll('.swappable-player');

    if (players.length > 0) {
        const playerMatch = players[0].closest('.swap-matches');
        if (playerMatch && playerMatch.hasAttribute('data-timeslot')) {
            const timeSlot = playerMatch.getAttribute('data-timeslot');
        }
    }

    const teamContainers = document.querySelectorAll('.swap-teams');


    teamContainers.forEach(container => {
        const timeSlotId = container.dataset.timeslot;

        Sortable.create(container, {
            group: {
                name: `timeslot-${timeSlotId}`,
                pull: true,
                put: true
            },
            swap: true,
            swapClass: 'swap-highlight',
            animation: 150,
            draggable: '.swappable-player',
            ghostClass: 'ghost',
        });
    });


</script>

</body>
</html>
