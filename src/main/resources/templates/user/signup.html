<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head::headfragment}"></head>
<body class="bg-dark bg-opacity-25">
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container py-4" th:object="${padelDay}">

    <!--als er geen padeldag beschikbaar is:-->
    <div class="bg-warning bg-opacity-50" th:unless="${padelDay}">
        <p class="fs-2 text-center text-danger">Er is momenteel geen padeldag gepland.</p>
    </div>

    <!--als er een padeldag beschikbaar is maar nog geen planning is gemaakt:-->
    <div th:if="${padelDay}" th:unless="${hasPlan}">
        <h2 class="mb-4 text-center">Algemene informatie over de volgende padeldag:</h2>
        <div class="row">
            <div class="col-6 mt-5">
                <div class="col-8 ms-3">
                    <div class="fs-5 mb-5 bg-dark text-light rounded border border-dark p-2 text-center" th:text="|Startuur: ${#temporals.format(padelDay.date, 'HH:mm')}|"></div>
                    <div class="fs-5 mb-5 bg-dark text-light rounded border border-dark p-2 text-center" th:text="|Dag: ${padelDay.date.getDayOfWeek()} ${#temporals.format(padelDay.date, 'dd/MM/yyyy')}|"></div>
                    <div class="fs-5 mb-5 bg-dark text-light rounded border border-dark p-2 text-center" th:text="|Velden: ${#strings.listJoin(padelDay.fields.![name], ', ')} (${padelDay.fields.size()*4} plaatsen)|"></div>
                </div>
            </div>
            <div class="col-6 mt-4">
                <div class="mb-5">
                    <h3 class="border-dark border-bottom text-center">Inschrijvingen:</h3>
                    <div class="mt-3 text-center" th:each="p : ${padelDay.signedUpPlayers}">
                        <div  th:text="|-${p.name}|"></div>
                    </div>
                    <div class="mt-3 fs-5 text-center" th:text="${padelDay.signedUpPlayers.size()==0?'Nog geen inschrijvingen':''}"></div>
                </div>

                <div class="mb-4">
                    <h3 class="border-dark border-bottom text-center">Reservelijst: </h3>
                    <div class="mt-3 text-center" th:each="p : ${padelDay.reservedPlayers}">
                        <div th:text="|-${p.name}|"></div>
                    </div>
                    <div class="mt-3 fs-5 text-center" th:text="${padelDay.reservedPlayers.size()==0?'Reservelijst is leeg':''}"></div>
                </div>

                <div class="d-flex justify-content-center mt-5">
                    <form th:action="@{/user/signup}" method="post">
                        <input type="hidden" name="id" th:value="${padelDay.id}" />
                        <button class="btn btn-pma px-2 fw-bold shadow-sm" th:disabled="${isSignedUp}" type="submit">Ik wil me inschrijven</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!--als er een padeldag beschikbaar is en een planning is aangemaakt:-->
    <div th:if="${hasPlan}">
        <h2 class="text-center mb-5 text-bg-info">De planning voor deze padeldag is al opgesteld, je komt op de reservelijst</h2>
        <div class="container py-4">
            <div class="row g-0 border border-black">
                <div class="col-12 border bg-dark text-light p-2 fw-bold" th:text="${#temporals.format(padelDay.date, 'dd/MM/yyyy')}"></div>
            </div>

            <div class="row g-0 d-flex justify-content-center align-items-center bg-light bg-dark text-light border border-black">
                <div class="col-1 text-center fw-bold px-2">Veld</div>
                <div class="col-11">
                    <div class="row g-0">
                        <div class="col-2 col-md-1 border-end border-start p-2 fw-bold d-flex align-items-center justify-content-center text-center">Team</div>
                        <div th:each="timeSlot : ${padelDay.uniqueTimeSlots}"
                             th:class="|col border-end p-2 fw-bold text-center|"
                             th:text="'Match ' + ${timeSlotStat.count} + ' (' + ${timeSlot} + ')'"></div> <!--th:class="|col-${12 / padelDay.fields.size()} border-end ps-2 fw-bold|"-->
                    </div>
                </div>
            </div>

            <div th:each="field : ${padelDay.fields}" class="border border-black">
                <div class="container-fluid p-0">

                    <div class="row g-0 border-start border-end border-bottom">

                        <div class="col-1 border-end d-flex align-items-center justify-content-center fs-2 fw-bold" th:text="${field.id}"></div>

                        <div class="col-11">

                            <div class="row g-0 border-bottom flex-nowrap">

                                <!--team A-->

                                <div  style="background-color:#001F3F" class="col-2 col-lg-1 fw-bold text-light border-end p-2 d-flex justify-content-center align-items-center text-center">Team A</div>
                                <!--${12/ padelDay.matches.size()}-->

                                <div th:each="match : ${padelDay.matches}" th:class="|col border-end p-2 text-wrap|" th:if="${match.field == field}">
                                    <div th:each="player : ${match.teams[0].players}"
                                         th:class="|badge rounded-pill text-light mb-1 d-block text-wrap|"
                                         style="background-color: #001F3F;">

                                        <!-- Volledige naam (allen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="${player.name}"></span>

                                        <!-- Afgekorte naam (kleinere schermen) -->
                                        <span class="d-inline d-md-none"
                                              th:with="nameParts=${#strings.arraySplit(player.name, ' ')}"
                                              th:text="${nameParts.length > 1} ? ${#strings.substring(nameParts[0],0,1)} + '. ' + ${nameParts[nameParts.length - 1]} : ${player.name}">
    </span>

                                        <!-- Ranking (alleen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="| (${player.pRanking})|"></span>
                                    </div>
                                </div>

                                <!-- 12 / (12/ padelDay.matches.size()) = 12??? -->
                                <!-- 12 / 3 = 4 12??? -->
                            </div>

                            <div class="row g-0 flex-nowrap">

                                <!--team B-->

                                <div style="background-color: #DFFF00" class="col-2 col-lg-1 fw-bold text-dark border-end p-2 d-flex justify-content-center align-items-center text-center">Team B</div>

                                <div th:each="match : ${padelDay.matches}" class="col border-end p-2" th:if="${match.field == field}">
                                    <div th:each="player : ${match.teams[0].players}"
                                         th:class="|badge rounded-pill text-dark mb-1 d-block text-wrap|"
                                         style="background-color: #DFFF00;">

                                        <!-- Volledige naam (allen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="${player.name}"></span>

                                        <!-- Afgekorte naam (kleinere schermen) -->
                                        <span class="d-inline d-md-none"
                                              th:with="nameParts=${#strings.arraySplit(player.name, ' ')}"
                                              th:text="${nameParts.length > 1} ? ${#strings.substring(nameParts[0],0,1)} + '. ' + ${nameParts[nameParts.length - 1]} : ${player.name}">
    </span>

                                        <!-- Ranking (alleen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="| (${player.pRanking})|"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
            </div>
            <h2 class="mt-4 border-top border-3 border-dark">Reservelijst: </h2>
            <div th:each="p : ${padelDay.reservedPlayers}">
                <div th:text="|-${p.name}|"></div>
            </div>
            <div th:text="${padelDay.reservedPlayers.size()==0?'Reservelijst is leeg':''}"></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
