<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<main class="container-fluid bg-dark">
    <form th:action="@{|/login|}" method="post">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4 mt-5">
                <div class="card border border-light-subtle rounded-3 shadow-sm">
                    <div class="card-body p-3 p-md-4 p-xl-5">
                        <div class="row gy-2">
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <input
                                            id="username"
                                            class="form-control bg-dark text-light border-secondary"
                                            placeholder="username"
                                            name="username"
                                            required
                                    />
                                    <label for="username" style="background-color: transparent; color: #adb5bd;">
                                        username
                                    </label>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <input
                                            id="password"
                                            class="form-control bg-dark text-light border-secondary"
                                            placeholder="password"
                                            name="password"
                                            type="password"
                                            required
                                    />
                                    <label for="password" style="background-color: transparent; color: #adb5bd;">
                                        password
                                    </label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-pma btn-block mb-4">
                                log in
                            </button>
                            <div class="text-center">
                                <p>Nog niet geregistreerd? <a class="text-danger" th:href="@{|/register|}">Register</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
