<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main>
    <div th:if="${padelDay != null and !padelDay.matches.isEmpty()}">
        <h1 class="text-center my-5">Overzicht eerst volgende speelmomenten</h1>
        <div th:replace="~{fragments/plantable::plantablefragment}"></div>
    </div>
    <div class="fs-2 p-5 text-center text-white bg-dark m-5 rounded" th:if="${padelDay == null or padelDay.matches.isEmpty()}">
        Er is nog geen planning voor de komende padel dag, kom later terug of log in en kijk bij de <a th:href="@{/user/padeldays}">Inshrijvingen</a>
    </div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
