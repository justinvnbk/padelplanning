<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head::headfragment}"></head>
<body class="bg-dark bg-opacity-25">
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main>
    <p class="mx-5 my-3 fs-2">
        Welcome <span th:if="${playerName != null}" th:text="|back ${playerName}|"></span> :)
    </p>
    <div th:if="${padelDay}">
        <div class="container py-4">
            <h1 class="text-center mb-5">Overzicht Speelmomenten</h1>
            <div class="row g-0 border border-black">
                <div class="col-12 border bg-dark text-light p-2 fw-bold" th:text="${#temporals.format(padelDay.date, 'dd/MM/yyyy')}"></div>
            </div>

            <div class="row g-0 d-flex justify-content-center align-items-center bg-light bg-dark text-light border border-black">
                <div class="col-1 text-center fw-bold px-2">Veld</div>
                <div class="col-11">
                    <div class="row g-0">
                        <div class="col-2 col-md-1 border-end border-start p-2 fw-bold d-flex align-items-center justify-content-center text-center">Team</div>
                        <div th:each="timeSlot : ${padelDay.uniqueTimeSlots}"
                             th:class="|col border-end p-2 fw-bold text-center|"
                             th:text="'Match ' + ${timeSlotStat.count} + ' (' + ${timeSlot} + ')'"></div> <!--th:class="|col-${12 / padelDay.fields.size()} border-end ps-2 fw-bold|"-->
                    </div>
                </div>
            </div>

            <div th:each="field : ${padelDay.fields}" class="border border-black">
                <div class="container-fluid p-0">

                    <div class="row g-0 border-start border-end border-bottom">

                        <div class="col-1 border-end d-flex align-items-center justify-content-center fs-2 fw-bold" th:text="${field.name}"></div>

                        <div class="col-11">

                            <div class="row g-0 border-bottom flex-nowrap">

                                <!--team A-->

                                <div  style="background-color:#001F3F" class="col-2 col-lg-1 fw-bold text-light border-end p-2 d-flex justify-content-center align-items-center text-center">Team A</div>

                                <div th:each="match : ${padelDay.matches}" th:class="|col border-end p-2 text-wrap|" th:if="${match.field == field}">
                                    <div th:each="player : ${match.teams[0].players}"
                                         th:class="|badge rounded-pill text-light mb-1 d-block text-wrap|"
                                         style="background-color: #001F3F;">

                                        <!-- Volledige naam (allen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="${player.name}"></span>

                                        <!-- Afgekorte naam (kleinere schermen) -->
                                        <span class="d-inline d-md-none"
                                              th:with="nameParts=${#strings.arraySplit(player.name, ' ')}"
                                              th:text="${nameParts.length > 1} ? ${#strings.substring(nameParts[0],0,1)} + '. ' + ${nameParts[nameParts.length - 1]} : ${player.name}">
                                        </span>

                                        <!-- Ranking (alleen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="| (${player.pRanking})|"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-0 flex-nowrap">

                                <!--team B-->

                                <div style="background-color: #DFFF00" class="col-2 col-lg-1 fw-bold text-dark border-end p-2 d-flex justify-content-center align-items-center text-center">Team B</div>

                                <div th:each="match : ${padelDay.matches}" class="col border-end p-2" th:if="${match.field == field}">
                                    <div th:each="player : ${match.teams[0].players}"
                                         th:class="|badge rounded-pill text-dark mb-1 d-block text-wrap|"
                                         style="background-color: #DFFF00;">

                                        <!-- Volledige naam (allen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="${player.name}"></span>

                                        <!-- Afgekorte naam (kleinere schermen) -->
                                        <span class="d-inline d-md-none"
                                              th:with="nameParts=${#strings.arraySplit(player.name, ' ')}"
                                              th:text="${nameParts.length > 1} ? ${#strings.substring(nameParts[0],0,1)} + '. ' + ${nameParts[nameParts.length - 1]} : ${player.name}">
    </span>

                                        <!-- Ranking (alleen zichtbaar op grote schermen) -->
                                        <span class="d-none d-md-inline" th:text="| (${player.pRanking})|"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="fs-2 p-5 text-center text-white bg-dark m-5 rounded" th:unless="${padelDay}">Er is nog geen nieuwe padel dag gepland, kom later terug</div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
