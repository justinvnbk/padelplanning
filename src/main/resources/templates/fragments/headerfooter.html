<header th:fragment="navbar" xmlns:sec="http://www.w3.org/1999/xhtml">
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container-fluid nav-container align-items-center">

            <div class="d-flex align-items-center p-0 nav-left">
                <a class="navbar-brand logo" th:href="@{/}"></a>
            </div>

            <p class="m-0 text-nowrap welcome d-none d-md-block" style="font-size: 1.2rem">
                <span th:if="${currentUser != null}" th:text="|Welkom terug ${currentUser.name}|"></span>
                <span th:if="${currentUser == null}">Welkom op onze pagina</span>
            </p>

            <div class="d-flex align-items-center ms-auto d-md-none gap-2">

                <a class="btn d-flex align-items-center justify-content-center me-3 p-0"
                   sec:authorize="isAuthenticated()"
                   th:classappend="|${currentUser.hasUnseenNotifications ? 'btn-pma' : 'btn-dark'} rounded-circle|"
                   style="width: 42px; height: 42px;"
                   th:href="@{/user/notifications}">

                    <!-- Using an actual vector icon instead of a text character -->
                    <i class="bi bi-bell-fill text-white" style="font-size: 1.2rem;"></i>
                </a>

                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarMenu"
                        aria-controls="navbarMenu"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse justify-content-end align-items-center" id="navbarMenu">
                <p class="m-0 py-2 text-nowrap welcome d-block d-md-none">
                    Welkom <span th:if="${currentUser != null}" th:text="|terug ${currentUser.name}|"></span>
                </p>

                <ul class="navbar-nav gap-2 mb-0 text-nowrap align-items-md-center">
                    <li class="nav-item d-none d-md-flex">
                        <a class="btn d-flex align-items-center justify-content-center ms-2 me-3 mt-2"
                           sec:authorize="isAuthenticated()"
                           th:classappend="|${currentUser.hasUnseenNotifications ? 'btn-pma' : 'btn-dark'} rounded-circle|"
                           style="width: 3rem; height: 3rem;"
                           th:href="@{/user/notifications}">
                            <i class="bi bi-bell-fill text-white"
                               style="font-size: 1.5rem; line-height: 1; transform: translateY(-2px);"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUrl=='/home'||currentUrl=='/'?'active':''}"
                           th:href="@{/}">🏠Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link border-start-md" th:classappend="${currentUrl=='/user/padeldays'?'active':''}"
                           th:href="@{/user/padeldays}">🧾Inschrijven</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link border-start-md" th:classappend="${currentUrl=='/user/profile'?'active':''}"
                           th:href="@{/user/profile}">👤Mijn Profiel</a>
                    </li>

                    <li class="nav-item dropdown" sec:authorize="hasAuthority('ADMIN')">
                        <a class="nav-link dropdown-toggle border-start-md"
                           th:classappend="${currentUrl.startsWith('/admin/')?'active':''}"
                           role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            ⚙️Admin options
                        </a>
                        <ul class="dropdown-menu bg-black">
                            <li><a class="dropdown-item text-white" th:classappend="${currentUrl=='/admin/padeldays'?'active':''}" th:href="@{/admin/padeldays}">Padeldagen</a></li>
                            <li><a class="dropdown-item text-white" th:classappend="${currentUrl=='/admin/players'?'active':''}" th:href="@{/admin/players}">Spelers/register</a></li>
                            <li><a class="dropdown-item text-white" th:classappend="${currentUrl=='/admin/fields'?'active':''}" th:href="@{/admin/fields}">Velden</a></li>
                        </ul>
                    </li>

                    <li class="nav-item py-2 py-md-0 mt-1 ms-2 login">
                        <a sec:authorize="!isAuthenticated()" th:class="|btn btn-pma|" th:href="@{/login}">login</a>
                    </li>
                    <li class="nav-item py-2 py-md-0 mt-1 ms-2 logout">
                        <a sec:authorize="isAuthenticated()" th:class="|btn btn-pma|" th:href="@{/logout}">Log out</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<footer th:fragment="footer">
    <div class="container text-center">
        <p class="mb-0">&copy; <span th:text="${#dates.year(#dates.createNow())}"></span> ANT_Team_2</p>
    </div>
</footer>
