<header th:fragment="navbar" xmlns:sec="http://www.w3.org/1999/xhtml">
    <nav class="navbar navbar-expand-md">
        <div class="container">

            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/logo/padelclub_logo.png}" alt="logo" style="max-height: 50px;">
            </a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarMenu"
                    aria-controls="navbarMenu"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto align-items-md-center gap-md-2 mb-2 mb-md-0">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUrl=='/home'||currentUrl=='/'?'active':''}" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUrl=='/reserve'?'active':''}" href="#">Reserveren</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUrl=='/about'?'active':''}" href="#">Over ons</a>
                    </li>
                    <li class="nav-item ms-md-3">
                        <a class="btn btn-pma" th:classappend="${currentUrl=='/login'?'active':''}" href="#">Log in</a>
                        <a sec:authorize="!isAuthenticated()" th:class="|btn btn-pma ${currentUrl=='/login'? 'active' : ''}|" th:href="@{/login}">login</a>
                    </li>
                    <li class="nav-item ms-md-3">
                        <a sec:authorize="isAuthenticated()" th:class="|btn btn-pma ${currentUrl=='/logout'? 'active' : ''}|" th:href="@{/logout}">Log out</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<footer th:fragment="footer">
    <div class="container text-center">
        <p class="mb-0">&copy; <span th:text="${#dates.year(#dates.createNow())}"></span> ANT_Padelplanning_Team2</p>
    </div>
</footer>
