<div th:fragment="plantablefragment" class="container p-0 plantable mb-5">
    <div class="row g-0 border border-black">
        <div class="col-12 border-bottom  bg-dark text-light p-2 fw-bold"
             th:text="${#temporals.format(padelDay.date, 'dd/MM/yyyy')}"></div>
    </div>

    <div class="row g-0 d-flex justify-content-center align-items-center bg-light bg-dark text-light border border-black">
        <div class="col-1 text-center fw-bold px-2">
            <span class="d-md-none">V</span>
            <span class="d-none d-md-inline" style="font-size: 1.2rem">Veld</span>
        </div>
        <div class="col-11">
            <div class="row g-0">
                <div style="font-size: 1.2rem"
                     class="col-2 col-md-1 border-end border-start p-2 fw-bold d-flex align-items-center justify-content-center text-center team-title">
                    Team
                </div>
                <div style="font-size: 1.2rem"
                     th:each="timeSlot : ${padelDay.uniqueTimeSlots}"
                     th:class="|col border-end p-2 fw-bold text-center mt-1 matches|"
                     th:text="'Match ' + ${timeSlotStat.count} + ' (' + ${timeSlot} + ')'"></div>
            </div>
        </div>
    </div>

    <div th:each="field : ${padelDay.fields}" th:if="${#lists.contains(padelDay.matches.![field], field)}" class="border border-black">
        <div class="container-fluid p-0">

            <div class="row g-0 border-start border-end border-bottom border-dark">

                <div class="col-1 border-end d-flex align-items-center justify-content-center fs-2 fw-bold veld"
                     th:text="${field.name}"></div>

                <div class="col-11">

                    <div class="row g-0 border-bottom flex-nowrap">

                        <!--team A-->

                        <div style="font-size: 1.3rem; background-color:#19466e"
                             class="col-2 col-md-1 fw-bold text-light border-end p-2 d-flex justify-content-center align-items-center text-center team">
                            Team A
                        </div>

                        <div th:each="match : ${padelDay.matches}" th:class="|col border-end p-2 text-wrap|"
                             th:if="${match.field == field}">
                            <div th:each="player : ${match.teams[0].players}"
                                 th:class="|badge rounded-pill text-light mb-1 d-block text-wrap|"
                                 th:classappend="${currentUser?.name==player.name?'loggedinEmpesis':''}"
                                 style="background-color: #19466e;">

                                <!-- Volledige naam (allen zichtbaar op grote schermen) -->
                                <span class="d-none d-md-inline" style="font-size: 1rem"
                                      th:text="${player.name}"></span>

                                <!-- Afgekorte naam (kleinere schermen) -->
                                <span class="d-inline d-md-none name-small"
                                      th:with="nameParts=${#strings.arraySplit(player.name, ' ')}"
                                      th:text="${nameParts.length > 1} ?  ${nameParts[nameParts.length - 2]} + ' ' + ${#strings.substring(nameParts[1],0,1)} + '.' : ${player.name}">
                                    </span>
                            </div>
                        </div>
                    </div>

                    <div class="row g-0 flex-nowrap">

                        <!--team B-->

                        <div style=" font-size: 1.3rem; background-color: #f6f45a"
                             class="col-2 col-md-1 fw-bold text-dark border-end p-2 d-flex justify-content-center align-items-center text-center team">
                            Team B
                        </div>

                        <div th:each="match : ${padelDay.matches}" class="col border-end p-2"
                             th:if="${match.field == field}">
                            <div th:each="player : ${match.teams[1].players}"
                                 th:class="|badge rounded-pill text-dark mb-1 d-block text-wrap|"
                                 th:classappend="${currentUser?.name==player.name?'loggedinEmpesis':''}"
                                 style="background-color: #f6f45a;">

                                <!-- Volledige naam (allen zichtbaar op grote schermen) -->
                                <span class="d-none d-md-inline" style="font-size: 1rem"
                                      th:text="${player.name}"></span>

                                <!-- Afgekorte naam (kleinere schermen) -->
                                <span class="d-inline d-md-none name-small" style="max-width: 80px;"
                                      th:with="nameParts=${#strings.arraySplit(player.name, ' ')}"
                                      th:text="${nameParts.length > 1} ?  ${nameParts[nameParts.length - 2]} + ' ' + ${#strings.substring(nameParts[1],0,1)} + '.' : ${player.name}">
                                    </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
