<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container py-4">
    <h1 class="text-center mb-5">Nieuw plan opstarten en openen voor inschrijvingen</h1>
    <form th:action="@{/admin/nieuwplan}" th:object="${padelDay}" method="post">
        <div class="row">
            <div class="col-12">
                <label for="padelDayDate" class="form-label fw-bold">Start datum en uur:</label>
                <input id="padelDayDate" autofocus class="form-control" type="datetime-local" th:field="*{date}" th:errorclass="is-invalid">
            </div>
            <div class="col-12">
                <label for="padelDayMatches" class="form-label fw-bold">Aantal matches:</label>
                <input id="padelDayMatches" class="form-control" th:field="*{numberOfMatches}" th:errorclass="is-invalid">
            </div>
            <div class="col-12">
                <label for="padelDayAvailableFields" class="form-label fw-bold">Beschikbare velden:</label>
                <select multiple id="padelDayAvailableFields" class="form-select" th:field="*{fields}" size="5">
                    <option th:each="f : ${fields}"
                            th:value="${f.id}"
                            th:text="|${f.name}|">
                    </option>
                </select>
                <div class="form-text mt-2">Houd Ctrl (of Cmd) ingedrukt om selectie te wijzigen.</div>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
                <a class="btn btn-outline-secondary px-4" th:href="@{/admin/plan}">Annuleer</a>
                <button class="btn btn-primary px-5 fw-bold shadow-sm" type="submit">Maak aan</button>
            </div>
        </div>
    </form>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
