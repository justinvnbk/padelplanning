<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body class="bg-dark bg-opacity-25">
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container-fluid bg-dark">
    <form th:action="@{/admin/player-detail/{id}(id=${player.id})}" th:object="${player}" method="post">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4 my-5">
                <div class="card border border-light-subtle rounded-3 shadow-sm">
                    <div class="card-body p-3 p-md-4 p-xl-5">
                        <h4 class="text-center mb-4" th:text="${player.name}"></h4>

                        <div th:if="${param.saved}" class="alert alert-success mb-3">
                            Profiel succesvol opgeslagen.
                        </div>

                        <div class="row gy-2">

                            <!-- Email -->
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <input id="email" th:field="*{email}" type="email"
                                           class="form-control bg-dark text-light border-secondary"
                                           placeholder="email" required/>
                                    <label for="email" style="background-color: transparent; color: #adb5bd;">
                                        Email <span class="text-danger">*</span>
                                    </label>
                                </div>
                            </div>

                            <!-- Birth Date -->
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <input id="birthDate" th:field="*{birthDate}" type="date"
                                           class="form-control bg-dark text-light border-secondary"
                                           placeholder="birthDate" required/>
                                    <label for="birthDate" style="background-color: transparent; color: #adb5bd;">
                                        Geboortedatum <span class="text-danger">*</span>
                                    </label>
                                </div>
                            </div>

                            <!-- P-Ranking -->
                            <div class="col-12 mb-3">
                                <div class="form-floating">
                                    <select id="pRanking" name="pRanking"
                                            class="form-select bg-dark text-light border-secondary">
                                        <option value="">NVT</option>
                                        <option value="50" th:selected="${player.pRanking == 50}">P50</option>
                                        <option value="100" th:selected="${player.pRanking == 100}">P100</option>
                                        <option value="200" th:selected="${player.pRanking == 200}">P200</option>
                                        <option value="300" th:selected="${player.pRanking == 300}">P300</option>
                                        <option value="400" th:selected="${player.pRanking == 400}">P400</option>
                                        <option value="500" th:selected="${player.pRanking == 500}">P500</option>
                                        <option value="700" th:selected="${player.pRanking == 700}">P700</option>
                                        <option value="1000" th:selected="${player.pRanking == 1000}">P1000</option>
                                    </select>
                                    <label for="pRanking" style="background-color: transparent; color: #adb5bd;">P-Ranking</label>
                                </div>
                            </div>

                            <!-- Telephone -->
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <input id="telephone" th:field="*{telephone}"
                                           class="form-control bg-dark text-light border-secondary"
                                           placeholder="telephone" required/>
                                    <label for="telephone" style="background-color: transparent; color: #adb5bd;">
                                        Telefoon <span class="text-danger">*</span>
                                    </label>
                                </div>
                            </div>

                            <!-- Self Evaluation -->
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <select id="selfEvaluation" th:field="*{selfEvaluation}"
                                            class="form-select bg-dark text-light border-secondary" required>
                                        <option th:each="se : ${selfEvaluations}"
                                                th:value="${se}"
                                                th:text="${se}"></option>
                                    </select>
                                    <label for="selfEvaluation" style="background-color: transparent; color: #adb5bd;">
                                        Niveau <span class="text-danger">*</span>
                                    </label>
                                </div>
                            </div>

                            <!-- Preferred Playside -->
                            <div class="col-12">
                                <div class="form-floating mb-3">
                                    <select id="preferredPlayside" th:field="*{preferredPlayside}"
                                            class="form-select bg-dark text-light border-secondary" required>
                                        <option th:each="ps : ${playsides}"
                                                th:value="${ps}"
                                                th:text="${ps}"></option>
                                    </select>
                                    <label for="preferredPlayside"
                                           style="background-color: transparent; color: #adb5bd;">
                                        Voorkeurszijde <span class="text-danger">*</span>
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-pma btn-block mb-4">
                                Opslaan
                            </button>

                            <div class="text-center">
                                <a th:href="@{/admin/players}" class="text-danger">← Terug naar spelers</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
