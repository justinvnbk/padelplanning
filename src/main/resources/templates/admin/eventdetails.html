<!doctype html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>

<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
    <div class="container py-5">
        <div th:if="${clubEvent != null}" th:object="${clubEvent}" class="row justify-content-center">

            <div class="col-12 col-md-10 col-lg-8 col-xl-7">

                <div class="card border border-subtle rounded-3 shadow-sm">

                    <div class="card-header text-white p-3" th:classappend="*{published} ? ' bg-success' : ' bg-secondary'">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2">
                            <h1 class="h3 mb-0" th:text="*{title}"></h1>
                            <span class="badge text-bg-light" th:text="*{published} ? 'Gepubliceerd' : 'Niet gepubliceerd'"></span>
                        </div>
                    </div>

                    <div class="card-body p-3 p-md-4">

                        <div class="mb-4" th:if="*{description != null && !description.isBlank()}">
                            <h2 class="h5 fw-bold">Beschrijving</h2>
                            <p class="mb-0" style="white-space: pre-line;" th:text="*{description}">Beschrijving van het evenement</p>
                        </div>

                        <div class="mb-4">
                            <h2 class="h5 fw-bold">Locatie</h2>
                            <p class="mb-0" th:text="*{location}"></p>
                        </div>

                        <div class="row g-4 mb-4">

                            <div class="col-12 col-md-6">
                                <h2 class="h5 fw-bold">Start</h2>
                                <p class="mb-0" th:text="${#temporals.format(clubEvent.startDateTime,'dd-MM-yyyy HH:mm')}"></p>
                            </div>

                            <div class="col-12 col-md-6">
                                <h2 class="h5 fw-bold">Einde</h2>
                                <p class="mb-0" th:text="${#temporals.format(clubEvent.endDateTime,'dd-MM-yyyy HH:mm')}"></p>
                            </div>

                        </div>

                        <div>
                            <h2 class="h5 fw-bold">Deelnemers</h2>
                            <p class="mb-0">
                                <span th:text="*{participants.size()}"></span><span th:if="*{maximumParticipants != null}">/<span th:text="*{maximumParticipants}"></span></span>
                                deelnemers
                            </p>
                        </div>

                    </div>

                    <div class="card-footer bg-transparent p-3">
                        <div class="d-flex flex-column flex-sm-row justify-content-between gap-3">

                            <a class="btn btn-outline-secondary" th:href="@{/admin/events}">
                                Terug naar evenementen
                            </a>

                            <a class="btn btn-primary" th:href="@{/admin/events/{id}/edit(id=*{id})}">
                                Evenement bewerken
                            </a>

                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div th:unless="${clubEvent != null}" class="fs-2 p-5 text-center text-white bg-dark rounded">
            Het evenement dat u zoekt kan niet gevonden worden.
        </div>

    </div>
</main>

<footer th:replace="~{fragments/headerfooter::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        defer></script>
</body>
</html>
