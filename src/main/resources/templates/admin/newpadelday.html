<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>
<main class="container py-4 w-50">
    <h1 class="text-center mb-5">Nieuw plan opstarten en openen voor inschrijvingen</h1>
    <form th:action="@{/admin/newpadelday}" th:object="${padelDay}" method="post">
        <div class="row">
            <div class="col-12">
                <label for="padelDayDate" class="form-label fw-bold">Start datum en uur:</label>
                <input id="padelDayDate" autofocus class="form-control" type="datetime-local" th:field="*{date}"
                       th:errorclass="is-invalid">
            </div>
            <div class="col-12">
                <span>Een padel dag heeft 3 matchmomenten van 40 minuten dus eindigt 2 uur na start</span>
            </div>
            <div class="col-12 mt-2">
                <label class="form-label fw-bold">Beschikbare velden:</label>

                <div class="d-flex flex-column gap-2 mt-2">
                    <div th:each="f : ${fields}" class="form-check">
                        <input
                                class="form-check-input border-secondary"
                                type="checkbox"
                                th:id="${'field-' + f.id}"
                                th:value="${f.id}"
                                th:field="*{fields}"
                        />
                        <label class="form-check-label" th:for="${'field-' + f.id}">
                            <span th:text="${f.name}">Veld Naam</span>
                            <span class="text-secondary small"
                                  th:text="'(' + (${f.isOutside} ? (${f.isCovered} ? 'buiten overdekt' : 'buiten niet overdekt') : 'binnen') + ')'">
                                (type)
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
                <a class="btn btn-danger px-4" th:href="@{/admin/padeldays}">Annuleer</a>
                <button class="btn btn-primary px-5 fw-bold shadow-sm" type="submit">Maak aan</button>
            </div>
        </div>
    </form>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
