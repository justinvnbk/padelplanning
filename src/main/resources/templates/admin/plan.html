<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body class="bg-dark bg-opacity-10">
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container py-4" th:object="${padelDay}">
        <h1 class="text-center mb-5">Plan een padeldag</h1>

        <!--als er geen padeldag beschikbaar is:-->
        <a class="btn btn-primary" th:href="@{/admin/newpadelday}" th:unless="${padelDay}">Start nieuwe padel dag</a>

        <!--als er een padeldag beschikbaar is maar nog geen planning is gemaakt:-->
        <div th:if="${padelDay}" th:unless="${hasPlan}">
                <h2>Inschrijvingen:</h2>
                <div th:each="p : ${padelDay.signedUpPlayers}">
                        <div th:text="${p.name}"></div>
                </div>
                <div th:text="${padelDay.signedUpPlayers.size()==0?'Nog geen inschrijvingen':''}"></div>
                <h2>Reservelijst: </h2>
                <div th:each="p : ${padelDay.reservedPlayers}">
                        <div th:text="${p.name}"></div>
                </div>
                <div th:text="${padelDay.reservedPlayers.size()==0?'Reservelijst is leeg':''}"></div>
                <form th:action="@{/admin/plan}" method="post">
                        <input type="hidden" name="id" th:value="${padelDay.id}" />
                        <button class="btn btn-primary px-5 fw-bold shadow-sm" type="submit">Maak planning aan</button>
                </form>
        </div>

        <!--als er een padeldag beschikbaar is en een planning is aangemaakt:-->
        <div th:if="${hasPlan}">
            <div class="row border border-black">
                <div class="col-12 g-0 m-0 border bg-dark text-light p-2 fw-bold" th:text="${#temporals.format(padelDay.date, 'dd/MM/yyyy')}"></div>
            </div>
            <div th:each="field : ${padelDay.fields}" class="row border border-end-0 border-black">
                <div class="col-1 d-flex align-items-center justify-content-center fs-2 fw-bold" th:text="${field.name}"></div>

                <div class="row col-11 m-0 g-0 flex-nowrap">
                    <div class="col-4 border border-bottom-0 border-top-0 border-end-0 m-0 g-0" th:each="match, i : ${padelDay.matches}" th:if="${match.field == field}">
                        <div class="col-12 m-0 g-0">
                            <h6 class="fw-bold p-3 bg-dark bg-opacity-75 text-light m-0 g-0"
                                th:text="|Match ${(i.index / 3) + 1} (${match.getTimeSlot()})|">
                            </h6>
                        </div>

                        <form th:each="team, i : ${match.getTeams()}" th:object="${team}" th:action="@{/admin/planEdit}" method="post" class="box-shadow m-0 border border-dark border-bottom-0 bg-dark bg-opacity-10">
                            <input type="hidden" name="id" th:value="${team.id}" />
                            <div class="m-1" th:each="teamplayer : ${team.getPlayers()}">
                                <select class="form-select my-3" name="playerIds" th:style="|background-color: ${i.index==0?'#c8f7c5':'#ffd6d6'};|">
                                    <option th:each="player : ${padelDay.getSignedUpPlayers()}"
                                            th:value="${player.getId()}"
                                            th:text="|${player.getName()} (P-${player.pRanking})|"
                                            th:selected="${player.getId() == teamplayer.getId()}"></option>
                                    <option th:value="0"></option>
                                </select>
                            </div>

                            <button class="btn btn-pma m-2 fw-bold shadow-sm" type="submit">Save</button>
                        </form>
                    </div>
                </div>
            </div>
            <h2 class="mt-5 border-top border-dark border-2">Reservelijst: </h2>
            <div th:each="p : ${padelDay.reservedPlayers}">
                <div th:text="|-${p.name}|"></div>
            </div>
            <div class="fs-5" th:text="${padelDay.reservedPlayers.size()==0?'Reservelijst is leeg':''}"></div>
        </div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
