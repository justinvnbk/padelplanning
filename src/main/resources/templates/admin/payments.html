<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
    <div class="container py-4">
        <h2 class="text-center text-light mb-4">
            Betalingen voor
            <span th:text="${#temporals.format(padelDay.date, 'dd/MM/yyyy HH:mm')}"></span>
        </h2>

        <div class="row justify-content-center">
            <div class="col-12 col-sm-11 col-md-11 col-lg-10 col-xl-10 col-xxl-9">
                <div class="card border border-subtle rounded-3 shadow-sm">
                    <div class="card-body p-3 p-md-4 p-xl-5">
                        <div class="row">
                            <div class="col-12 col-md-4 mb-5">
                                <h3 class="border-bottom text-center">
                                    Betaald
                                </h3>

                                <div class="mt-3 px-2">
                                    <div th:each="p : ${paidPlayers}"
                                         class="py-1">
                                        <span class="badge bg-success me-2">Betaald</span>
                                        <span th:text="${p.name}"></span>
                                    </div>

                                    <div th:if="${#lists.isEmpty(paidPlayers)}"
                                         class="text-center fst-italic">
                                        Nog niemand heeft betaald.
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-md-4 mb-5">
                                <h3 class="border-bottom text-center">
                                    Nog niet betaald
                                </h3>

                                <div class="mt-3 px-4">
                                    <div th:each="p : ${unpaidPlayers}"
                                         class="py-1">
                                        <span class="badge bg-danger me-2">Niet betaald</span>
                                        <span th:text="${p.name}"></span>
                                    </div>

                                    <div th:if="${#lists.isEmpty(unpaidPlayers)}"
                                         class="text-center fst-italic">
                                        Iedereen heeft betaald.
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-md-4 mb-5">
                                <h3 class="border-bottom text-center">
                                    Reservelijst
                                </h3>

                                <div class="mt-3 px-4">
                                    <div th:each="p : ${reservedPlayers}"
                                         class="py-1">
                                        <span class="badge bg-secondary me-2">Reserve</span>
                                        <span th:text="${p.name}"></span>
                                    </div>

                                    <div th:if="${#lists.isEmpty(reservedPlayers)}"
                                         class="text-center fst-italic">
                                        Geen reservespelers.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
