<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container py-4">
<!--    Payed players-->
    <div class="mb-5">
        <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Betaald:</h3>
        <!-- Container for the names -->
        <div class="d-flex flex-wrap justify-content-center mt-3 list-players" style="font-size: 1.3rem">
            <!-- Each name takes up 50% width -->
            <div th:each="p : ${padelDay.signedUpPlayers}"
                 class="px-2" style="flex: 0 0 25%;" th:if="${p.payedPadelDays.contains(padelDay)}" th:text="|-${p.name}|">
            </div>
        </div>
        <div class="mt-3 fs-5 text-center"
             th:text="${padelDay.signedUpPlayers.size()==0?'Nog geen betalingen':''}"></div>
    </div>

<!--    Payed players-->
    <div class="mb-5">
        <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Nog niet betaald:</h3>
        <!-- Container for the names -->
        <div class="d-flex flex-wrap justify-content-center mt-3 list-players" style="font-size: 1.3rem">
            <!-- Each name takes up 50% width -->
            <div th:each="p : ${padelDay.signedUpPlayers}"
                 class="px-2" style="flex: 0 0 25%;" th:if="${!p.payedPadelDays.contains(padelDay)}" th:text="|-${p.name}|">
            </div>
        </div>
        <div class="mt-3 fs-5 text-center"
             th:text="${padelDay.signedUpPlayers.size()==0?'Iedereen heeft betaald':''}"></div>
    </div>

    <!--    Payed players in reserved list-->
    <div class="mb-5">
        <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Betaald maar op reservelijst:</h3>
        <!-- Container for the names -->
        <div class="d-flex flex-wrap justify-content-center mt-3 list-players" style="font-size: 1.3rem">
            <!-- Each name takes up 50% width -->
            <div th:each="p : ${padelDay.reservedPlayers}"
                 class="px-2" style="flex: 0 0 25%;" th:if="${p.payedPadelDays.contains(padelDay)}" th:text="|-${p.name}|">
            </div>
        </div>
        <div class="mt-3 fs-5 text-center"
             th:text="${padelDay.signedUpPlayers.size()==0?'Nog geen betalingen':''}"></div>
    </div>

    <!--    Payed players that signed out-->
    <div class="mb-5">
        <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Betaald maar uitgeschreven:</h3>
        <!-- Container for the names -->
        <div class="d-flex flex-wrap justify-content-center mt-3 list-players" style="font-size: 1.3rem">
            <!-- Each name takes up 50% width -->
            <div th:each="p : ${playersNotSignedUp}"
                 class="px-2" style="flex: 0 0 25%;" th:if="${p.payedPadelDays.contains(padelDay)}" th:text="|-${p.name}|">
            </div>
        </div>
        <div class="mt-3 fs-5 text-center"
             th:text="${padelDay.signedUpPlayers.size()==0?'Nog geen betalingen':''}"></div>
    </div>

</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
