<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>
<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="container py-4">
    <div class="row">
        <!--    Payed players-->
        <div class="col-12 col-md-6 mb-5">
            <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Betaald:</h3>
            <!-- Container for the names -->
            <div class="row mt-3 mx-auto px-5" style="font-size: 1.3rem">
                <span class="fs-5 text-success">Groen: bevestigd</span>
                <span class="fs-5 text-danger">Rood: nog bevestigd</span>
                <div th:each="p : ${padelDay.signedUpPlayers}" class="col-12 col-lg-6 px-2"
                     th:if="${p.payedPadelDays.contains(padelDay)}">
                    <form th:action="@{/admin/confirmPayment}"
                          th:unless="${p.confirmedPayedPadelDays.contains(padelDay)}" method="post"
                          class="d-inline p-0 m-0">
                        <input type="hidden" name="playerId" th:value="${p.id}"/>
                        <input type="hidden" name="padelDayId" th:value="${padelDay.id}"/>
                        <button type="submit"
                                class="btn btn-link text-decoration-none p-0 m-0 border-0 bg-transparent shadow-none">
                            ✅
                        </button>
                    </form>
                    <form th:action="@{/admin/unconfirmPayment}" th:if="${p.confirmedPayedPadelDays.contains(padelDay)}"
                          method="post" class="d-inline p-0 m-0">
                        <input type="hidden" name="playerId" th:value="${p.id}"/>
                        <input type="hidden" name="padelDayId" th:value="${padelDay.id}"/>
                        <button type="submit"
                                class="btn btn-link text-decoration-none p-0 m-0 border-0 bg-transparent shadow-none">
                            ❌
                        </button>
                    </form>
                    <span th:text="|-${p.name}|"
                          th:classappend="${p.confirmedPayedPadelDays.contains(padelDay)?'text-success':'text-danger'}">
                    </span>
                </div>
            </div>
        </div>

        <!--    Unayed players-->
        <div class="col-12 col-md-6 mb-5">
            <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Nog niet betaald:</h3>
            <!-- Container for the names -->
            <div class="row mt-3 mx-auto px-5" style="font-size: 1.3rem">
                <div th:each="p : ${padelDay.signedUpPlayers}"
                     class="col-12 col-lg-6 px-2" th:if="${!p.payedPadelDays.contains(padelDay)}"
                     th:text="|- ${p.name}|">
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <!--    Payed players in reserved list-->
        <div class="col-12 col-md-6 mb-5">
            <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Betaald maar op
                reservelijst:</h3>
            <!-- Container for the names -->
            <div class="row mt-3 mx-auto px-5" style="font-size: 1.3rem">
                <div th:each="p : ${padelDay.reservedPlayers}"
                     class="col-12 col-lg-6 px-2" th:if="${p.payedPadelDays.contains(padelDay)}" th:text="|-${p.name}|">
                </div>
            </div>
            <div class="mt-3 fs-5 text-center"
                 th:text="${padelDay.signedUpPlayers.size()==0?'Nog geen betalingen':''}"></div>
        </div>

        <!--    Payed players that signed out-->
        <div class="col-12 col-md-6 mb-5">
            <h3 style="font-size: 2rem" class="border-dark border-bottom text-center list-title">Betaald maar
                uitgeschreven:</h3>
            <!-- Container for the names -->
            <div class="row mt-3 mx-auto px-5" style="font-size: 1.3rem">
                <div th:each="p : ${playersNotSignedUp}"
                     class="col-12 col-lg-6 px-2 w-auto" th:if="${p.payedPadelDays.contains(padelDay)}"
                     th:text="|-${p.name}|">
                </div>
            </div>
            <div class="mt-3 fs-5 text-center"
                 th:text="${padelDay.signedUpPlayers.size()==0?'Nog geen betalingen':''}"></div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/headerfooter::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
