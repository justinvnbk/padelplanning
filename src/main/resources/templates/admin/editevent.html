<!doctype html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>

<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
    <div class="container-fluid">

        <form th:action="@{/admin/events/{id}/edit(id=${clubEvent.id})}" th:object="${clubEvent}" method="post">

            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4 my-5">

                    <div class="mb-4">
                        <a class="btn btn-outline-light" th:href="@{/admin/events/{id}(id=${clubEvent.id})}">← Terug naar evenement</a>
                    </div>

                    <div class="card border border-subtle rounded-3 shadow-sm">
                        <div class="card-body p-3 p-md-4 p-xl-5">

                            <h1 class="text-center mb-5">Evenement bewerken</h1>

                            <div class="row g-3">

                                <div class="col-12">
                                    <label for="title" class="form-label fw-bold">Naam evenement:</label>
                                    <input id="title" class="form-control" type="text" th:field="*{title}" required autofocus>
                                </div>

                                <div class="col-12">
                                    <label for="description" class="form-label fw-bold">Beschrijving:</label>
                                    <textarea id="description" class="form-control" th:field="*{description}" rows="5"></textarea>
                                </div>

                                <div class="col-12">
                                    <label for="location" class="form-label fw-bold">Locatie:</label>
                                    <input id="location" class="form-control" type="text" th:field="*{location}" required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="startDateTime" class="form-label fw-bold">Startdatum en uur:</label>
                                    <input id="startDateTime" class="form-control" type="datetime-local" th:field="*{startDateTime}" required>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="endDateTime" class="form-label fw-bold">Einddatum en uur:</label>
                                    <input id="endDateTime" class="form-control" type="datetime-local" th:field="*{endDateTime}" required>
                                </div>

                                <div class="col-12">
                                    <label for="maximumParticipants" class="form-label fw-bold">Maximumaantal deelnemers:</label>
                                    <input id="maximumParticipants" class="form-control" type="number" th:field="*{maximumParticipants}" min="1" placeholder="Laat leeg wanneer er geen limiet is">
                                    <span class="text-secondary small">Laat dit veld leeg wanneer iedereen zich mag inschrijven.</span>
                                </div>

                                <div class="col-12">
                                    <label for="price" class="form-label fw-bold">Prijs per deelnemer:</label>
                                    <input id="price"
                                           class="form-control"
                                           type="number"
                                           th:field="*{price}"
                                           min="0"
                                           step="0.05"
                                           placeholder="Bijvoorbeeld: 15,00"
                                           required>
                                    <span class="text-secondary small">Vul 0 in wanneer deelname gratis is.</span>
                                </div>

                                <div class="d-flex flex-column flex-md-row justify-content-center gap-3 mt-5 pt-3 border-top">
                                    <a class="btn btn-secondary" th:href="@{/admin/events/{id}(id=${clubEvent.id})}">Annuleren</a>
                                    <button class="btn btn-primary" type="submit">Wijzigingen opslaan</button>
                                </div>

                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/headerfooter::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
