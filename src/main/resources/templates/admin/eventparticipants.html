<!doctype html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head::headfragment}"></head>

<body>
<header th:replace="~{fragments/headerfooter::navbar}"></header>

<main class="home-pre">
  <div class="container py-5">

    <div class="mb-4">
      <a class="btn btn-outline-light" th:href="@{/admin/events/{id}(id=${clubEvent.id})}">← Terug naar evenement</a>
    </div>

    <div class="row justify-content-center">
      <div class="col-12 col-lg-9">

        <div class="card border border-subtle rounded-3 shadow-sm" th:object="${clubEvent}">

          <div class="card-header bg-dark text-white p-3">
            <h1 class="h3 mb-0">Deelnemers van <span th:text="*{title}"></span></h1>
          </div>

          <div class="card-body p-3 p-md-4">

            <p class="mb-4">
              <strong>Aantal deelnemers:</strong>
              <span th:text="*{participants.size()}"></span>
              <span th:if="*{maximumParticipants != null}">/<span th:text="*{maximumParticipants}"></span></span>
            </p>

            <div th:if="*{participants.isEmpty()}" class="alert alert-info mb-0">
              Er zijn nog geen deelnemers ingeschreven.
            </div>

            <div class="row g-3"
                 th:unless="*{participants.isEmpty()}">

              <div class="col-12 col-md-6 col-xl-4"
                   th:each="participant : *{participants}">

                <div class="card h-100 border border-subtle shadow-sm">
                  <div class="card-body">

                    <h2 class="h5 card-title mb-3" th:text="${participant.name}"></h2>

                    <div class="mb-2">
                      <strong>E-mail:</strong>
                      <a th:href="'mailto:' + ${participant.email}" th:text="${participant.email}"></a>
                    </div>

                    <div th:if="${participant.telephone != null && !participant.telephone.isBlank()}">
                      <strong>Telefoon:</strong>
                      <a th:href="'tel:' + ${participant.telephone}" th:text="${participant.telephone}"></a>
                    </div>

                    <div th:if="${participant.telephone == null || participant.telephone.isBlank()}" class="text-secondary">
                      Geen telefoonnummer beschikbaar
                    </div>

                  </div>
                </div>

              </div>

            </div>

          </div>
        </div>

      </div>
    </div>

  </div>
</main>

<footer th:replace="~{fragments/headerfooter::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
